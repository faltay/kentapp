openapi: 3.0.3
info:
  title: 'QR Menu — API Documentation'
  description: 'Public menu API for QR Menu SaaS. Fetch restaurant menus, categories and items to build your own integrations.'
  version: 1.0.0
servers:
  -
    url: 'http://qrmenu.test'
tags:
  -
    name: Menu
    description: "\nEndpoints for fetching public restaurant menus.\nAll endpoints require the restaurant to be active and not suspended."
paths:
  '/api/v1/menu/{slug}':
    get:
      summary: 'Full menu'
      operationId: fullMenu
      description: "Returns the restaurant info along with all active categories and their items.\nResponse is cached for 5 minutes per locale."
      parameters:
        -
          in: query
          name: locale
          description: 'Locale for localised content (`en` or `tr`). Defaults to `en`.'
          example: tr
          required: false
          schema:
            type: string
            description: 'Locale for localised content (`en` or `tr`). Defaults to `en`.'
            example: tr
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data:
                    restaurant:
                      name: 'Demo Restaurant'
                      slug: demo-restaurant
                      description: 'A great place to eat.'
                      currency: USD
                      logo: 'https://example.com/logo.jpg'
                      city: Istanbul
                      country: TR
                    categories:
                      -
                        id: 1
                        name: Starters
                        description: null
                        slug: starters
                        image: null
                        items:
                          -
                            id: 1
                            name: Bruschetta
                            description: 'Toasted bread with tomatoes.'
                            slug: bruschetta
                            price: 8.5
                            compare_price: null
                            discount_percent: 0
                            has_discount: false
                            image: 'https://example.com/img.jpg'
                            gallery: []
                            badges:
                              featured: false
                              vegetarian: true
                              vegan: false
                              spicy: false
                              gluten_free: false
                            preparation_time: 10
                            calories: 220
                            category_id: 1
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      restaurant:
                        type: object
                        properties:
                          name:
                            type: string
                            example: 'Demo Restaurant'
                          slug:
                            type: string
                            example: demo-restaurant
                          description:
                            type: string
                            example: 'A great place to eat.'
                          currency:
                            type: string
                            example: USD
                          logo:
                            type: string
                            example: 'https://example.com/logo.jpg'
                          city:
                            type: string
                            example: Istanbul
                          country:
                            type: string
                            example: TR
                      categories:
                        type: array
                        example:
                          -
                            id: 1
                            name: Starters
                            description: null
                            slug: starters
                            image: null
                            items:
                              -
                                id: 1
                                name: Bruschetta
                                description: 'Toasted bread with tomatoes.'
                                slug: bruschetta
                                price: 8.5
                                compare_price: null
                                discount_percent: 0
                                has_discount: false
                                image: 'https://example.com/img.jpg'
                                gallery: []
                                badges:
                                  featured: false
                                  vegetarian: true
                                  vegan: false
                                  spicy: false
                                  gluten_free: false
                                preparation_time: 10
                                calories: 220
                                category_id: 1
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                              example: 1
                            name:
                              type: string
                              example: Starters
                            description:
                              type: string
                              example: null
                              nullable: true
                            slug:
                              type: string
                              example: starters
                            image:
                              type: string
                              example: null
                              nullable: true
                            items:
                              type: array
                              example:
                                -
                                  id: 1
                                  name: Bruschetta
                                  description: 'Toasted bread with tomatoes.'
                                  slug: bruschetta
                                  price: 8.5
                                  compare_price: null
                                  discount_percent: 0
                                  has_discount: false
                                  image: 'https://example.com/img.jpg'
                                  gallery: []
                                  badges:
                                    featured: false
                                    vegetarian: true
                                    vegan: false
                                    spicy: false
                                    gluten_free: false
                                  preparation_time: 10
                                  calories: 220
                                  category_id: 1
                              items:
                                type: object
                                properties:
                                  id:
                                    type: integer
                                    example: 1
                                  name:
                                    type: string
                                    example: Bruschetta
                                  description:
                                    type: string
                                    example: 'Toasted bread with tomatoes.'
                                  slug:
                                    type: string
                                    example: bruschetta
                                  price:
                                    type: number
                                    example: 8.5
                                  compare_price:
                                    type: string
                                    example: null
                                    nullable: true
                                  discount_percent:
                                    type: integer
                                    example: 0
                                  has_discount:
                                    type: boolean
                                    example: false
                                  image:
                                    type: string
                                    example: 'https://example.com/img.jpg'
                                  gallery:
                                    type: array
                                    example: []
                                  badges:
                                    type: object
                                    properties:
                                      featured: { type: boolean, example: false }
                                      vegetarian: { type: boolean, example: true }
                                      vegan: { type: boolean, example: false }
                                      spicy: { type: boolean, example: false }
                                      gluten_free: { type: boolean, example: false }
                                  preparation_time:
                                    type: integer
                                    example: 10
                                  calories:
                                    type: integer
                                    example: 220
                                  category_id:
                                    type: integer
                                    example: 1
        404:
          description: 'Restaurant not found or inactive'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'No query results for model [App\Models\Restaurant].'
                properties:
                  message:
                    type: string
                    example: 'No query results for model [App\Models\Restaurant].'
      tags:
        - Menu
      security: []
    parameters:
      -
        in: path
        name: slug
        description: "The restaurant's unique slug."
        example: demo-restaurant
        required: true
        schema:
          type: string
  '/api/v1/menu/{slug}/categories':
    get:
      summary: Categories
      operationId: categories
      description: "Returns only the active categories for a restaurant (without items).\nUseful for building a category navigation before lazy-loading items."
      parameters:
        -
          in: query
          name: locale
          description: 'Locale for localised content (`en` or `tr`).'
          example: en
          required: false
          schema:
            type: string
            description: 'Locale for localised content (`en` or `tr`).'
            example: en
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data:
                    -
                      id: 1
                      name: Starters
                      description: null
                      slug: starters
                      image: null
                      items: []
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    example:
                      -
                        id: 1
                        name: Starters
                        description: null
                        slug: starters
                        image: null
                        items: []
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        name:
                          type: string
                          example: Starters
                        description:
                          type: string
                          example: null
                          nullable: true
                        slug:
                          type: string
                          example: starters
                        image:
                          type: string
                          example: null
                          nullable: true
                        items:
                          type: array
                          example: []
      tags:
        - Menu
      security: []
    parameters:
      -
        in: path
        name: slug
        description: "The restaurant's unique slug."
        example: demo-restaurant
        required: true
        schema:
          type: string
  '/api/v1/menu/{slug}/items':
    get:
      summary: 'Items list'
      operationId: itemsList
      description: "Returns a paginated list of active menu items.\nSupports filtering by category, full-text search, and featured flag."
      parameters:
        -
          in: query
          name: category
          description: 'Filter by category slug.'
          example: starters
          required: false
          schema:
            type: string
            description: 'Filter by category slug.'
            example: starters
        -
          in: query
          name: search
          description: 'Search by item name.'
          example: bruschetta
          required: false
          schema:
            type: string
            description: 'Search by item name.'
            example: bruschetta
        -
          in: query
          name: featured
          description: 'Return only featured items when `1`.'
          example: true
          required: false
          schema:
            type: boolean
            description: 'Return only featured items when `1`.'
            example: true
        -
          in: query
          name: per_page
          description: 'Items per page (max 100, default 20).'
          example: 10
          required: false
          schema:
            type: integer
            description: 'Items per page (max 100, default 20).'
            example: 10
        -
          in: query
          name: page
          description: 'Page number.'
          example: 1
          required: false
          schema:
            type: integer
            description: 'Page number.'
            example: 1
        -
          in: query
          name: locale
          description: 'Locale for localised content.'
          example: en
          required: false
          schema:
            type: string
            description: 'Locale for localised content.'
            example: en
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data:
                    -
                      id: 1
                      name: Bruschetta
                      description: 'Toasted bread with tomatoes.'
                      slug: bruschetta
                      price: 8.5
                      compare_price: null
                      discount_percent: 0
                      has_discount: false
                      image: null
                      gallery: []
                      badges:
                        featured: false
                        vegetarian: true
                        vegan: false
                        spicy: false
                        gluten_free: false
                      preparation_time: 10
                      calories: 220
                      category_id: 1
                  meta:
                    current_page: 1
                    last_page: 3
                    per_page: 20
                    total: 48
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    example:
                      -
                        id: 1
                        name: Bruschetta
                        description: 'Toasted bread with tomatoes.'
                        slug: bruschetta
                        price: 8.5
                        compare_price: null
                        discount_percent: 0
                        has_discount: false
                        image: null
                        gallery: []
                        badges:
                          featured: false
                          vegetarian: true
                          vegan: false
                          spicy: false
                          gluten_free: false
                        preparation_time: 10
                        calories: 220
                        category_id: 1
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        name:
                          type: string
                          example: Bruschetta
                        description:
                          type: string
                          example: 'Toasted bread with tomatoes.'
                        slug:
                          type: string
                          example: bruschetta
                        price:
                          type: number
                          example: 8.5
                        compare_price:
                          type: string
                          example: null
                          nullable: true
                        discount_percent:
                          type: integer
                          example: 0
                        has_discount:
                          type: boolean
                          example: false
                        image:
                          type: string
                          example: null
                          nullable: true
                        gallery:
                          type: array
                          example: []
                        badges:
                          type: object
                          properties:
                            featured:
                              type: boolean
                              example: false
                            vegetarian:
                              type: boolean
                              example: true
                            vegan:
                              type: boolean
                              example: false
                            spicy:
                              type: boolean
                              example: false
                            gluten_free:
                              type: boolean
                              example: false
                        preparation_time:
                          type: integer
                          example: 10
                        calories:
                          type: integer
                          example: 220
                        category_id:
                          type: integer
                          example: 1
                  meta:
                    type: object
                    properties:
                      current_page:
                        type: integer
                        example: 1
                      last_page:
                        type: integer
                        example: 3
                      per_page:
                        type: integer
                        example: 20
                      total:
                        type: integer
                        example: 48
      tags:
        - Menu
      security: []
    parameters:
      -
        in: path
        name: slug
        description: "The restaurant's unique slug."
        example: demo-restaurant
        required: true
        schema:
          type: string
  '/api/v1/menu/{slug}/items/{item}':
    get:
      summary: 'Single item'
      operationId: singleItem
      description: "Returns the full details of a single menu item.\nEach successful call increments the item's `view_count`."
      parameters:
        -
          in: query
          name: locale
          description: 'Locale for localised content.'
          example: en
          required: false
          schema:
            type: string
            description: 'Locale for localised content.'
            example: en
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  data:
                    id: 1
                    name: Bruschetta
                    description: 'Toasted bread with fresh tomatoes and basil.'
                    slug: bruschetta
                    price: 8.5
                    compare_price: 10.0
                    discount_percent: 15
                    has_discount: true
                    image: 'https://example.com/thumb.jpg'
                    gallery:
                      - 'https://example.com/gallery1.jpg'
                    badges:
                      featured: true
                      vegetarian: true
                      vegan: false
                      spicy: false
                      gluten_free: false
                    preparation_time: 10
                    calories: 220
                    category_id: 1
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: Bruschetta
                      description:
                        type: string
                        example: 'Toasted bread with fresh tomatoes and basil.'
                      slug:
                        type: string
                        example: bruschetta
                      price:
                        type: number
                        example: 8.5
                      compare_price:
                        type: number
                        example: 10.0
                      discount_percent:
                        type: integer
                        example: 15
                      has_discount:
                        type: boolean
                        example: true
                      image:
                        type: string
                        example: 'https://example.com/thumb.jpg'
                      gallery:
                        type: array
                        example:
                          - 'https://example.com/gallery1.jpg'
                        items:
                          type: string
                      badges:
                        type: object
                        properties:
                          featured:
                            type: boolean
                            example: true
                          vegetarian:
                            type: boolean
                            example: true
                          vegan:
                            type: boolean
                            example: false
                          spicy:
                            type: boolean
                            example: false
                          gluten_free:
                            type: boolean
                            example: false
                      preparation_time:
                        type: integer
                        example: 10
                      calories:
                        type: integer
                        example: 220
                      category_id:
                        type: integer
                        example: 1
        404:
          description: 'Item not found'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'No query results for model [App\Models\MenuItem].'
                properties:
                  message:
                    type: string
                    example: 'No query results for model [App\Models\MenuItem].'
      tags:
        - Menu
      security: []
    parameters:
      -
        in: path
        name: slug
        description: "The restaurant's unique slug."
        example: demo-restaurant
        required: true
        schema:
          type: string
      -
        in: path
        name: item
        description: "The menu item's slug."
        example: bruschetta
        required: true
        schema:
          type: string
